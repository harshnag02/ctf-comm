<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SRV-CORE :: Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0806;
    --bg-raised: #14100c;
    --amber: #ffb000;
    --amber-dim: #8c6a1f;
    --amber-faint: #4a3a15;
    --red: #d64545;
    --border: #2a2115;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--amber);
    font-family: 'IBM Plex Mono', monospace;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at center, rgba(255,176,0,0.04) 0%, rgba(0,0,0,0) 70%);
  }
  /* scanline overlay */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,176,0,0.025) 0px,
      rgba(255,176,0,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  /* ---------- Login screen ---------- */
  .login-wrap {
    width: 100%; max-width: 460px; padding: 32px;
  }
  .banner {
    font-size: 12px; color: var(--amber-dim); line-height: 1.6;
    border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 20px;
    white-space: pre;
  }
  .login-title {
    font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .login-sub { font-size: 12px; color: var(--amber-dim); margin-bottom: 24px; }
  label { display:block; font-size: 11px; color: var(--amber-dim); margin-bottom: 6px; letter-spacing: 0.05em; }
  input {
    width: 100%; background: var(--bg-raised); border: 1px solid var(--border);
    color: var(--amber); font-family: inherit; font-size: 14px; padding: 10px 12px;
    margin-bottom: 18px; outline: none;
  }
  input:focus { border-color: var(--amber-dim); }
  button.primary {
    width: 100%; background: var(--amber); color: #1a1400; border: none;
    font-family: inherit; font-weight: 700; font-size: 13px; letter-spacing: 0.08em;
    padding: 12px; cursor: pointer;
  }
  button.primary:hover { background: #ffc233; }
  .err { color: var(--red); font-size: 12px; margin: -8px 0 14px; min-height: 14px; }

  /* ---------- Terminal screen ---------- */
  #terminal-screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
  .term-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--amber-dim); letter-spacing: 0.05em;
  }
  .term-header .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background: var(--amber); margin-right: 6px; box-shadow: 0 0 6px var(--amber); }
  #log {
    flex: 1; overflow-y: auto; padding: 20px 24px; font-size: 13.5px; line-height: 1.7;
  }
  .line { margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; }
  .line .tag { color: var(--amber-dim); margin-right: 8px; }
  .line.client .tag { color: var(--amber-dim); }
  .line.server { color: #ffd27a; }
  .line.server .tag { color: var(--red); }
  .line.system { color: var(--amber-dim); font-style: italic; }

  .processing { color: var(--amber-dim); }
  .processing .bar { letter-spacing: 2px; }

  .term-input-row {
    display: flex; align-items: center; border-top: 1px solid var(--border);
    padding: 14px 20px;
  }
  .prompt-char { margin-right: 10px; color: var(--amber); font-weight: 700; }
  #cmd-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--amber); font-family: inherit; font-size: 14px;
  }
  #cmd-input::placeholder { color: var(--amber-faint); }
  #cmd-input:disabled { color: var(--amber-faint); }
</style>
</head>
<body>

  <div class="login-wrap" id="login-screen">
    <div class="banner">SRV-CORE ACCESS POINT
------------------------------------
AUTHORIZED PERSONNEL ONLY
ALL SESSIONS ARE LOGGED</div>
    <div class="login-title">SESSION AUTHENTICATION</div>
    <div class="login-sub">Enter your issued credentials to establish a link.</div>
    <label>USER ID</label>
    <input id="login-user" autocomplete="off" />
    <label>ACCESS KEY</label>
    <input id="login-pass" type="password" autocomplete="off" />
    <div class="err" id="login-err"></div>
    <button class="primary" id="login-btn">ESTABLISH CONNECTION</button>
  </div>

  <div id="terminal-screen">
    <div class="term-header">
      <div><span class="dot"></span><span id="host-label">SRV-CORE</span></div>
      <div id="session-id">SESSION —</div>
    </div>
    <div id="log"></div>
    <div class="term-input-row" id="input-row">
      <span class="prompt-char">&gt;</span>
      <input id="cmd-input" placeholder="type input and press enter..." autocomplete="off" />
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const loginScreen = document.getElementById('login-screen');
  const terminalScreen = document.getElementById('terminal-screen');
  const log = document.getElementById('log');
  const cmdInput = document.getElementById('cmd-input');
  const inputRow = document.getElementById('input-row');
  const sessionIdEl = document.getElementById('session-id');

  let socket = null;
  let processingEl = null;
  let processingTimer = null;

  const PHRASES = [
    'VALIDATING INPUT',
    'ROUTING PACKET',
    'CONTACTING CORE',
    'AWAITING RESPONSE',
    'VERIFYING INTEGRITY'
  ];

  function addLine(tag, text, cls) {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.innerHTML = '<span class="tag">' + tag + '</span>' + escapeHtml(text);
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.innerText = str;
    return d.innerHTML;
  }

  function startProcessing() {
    inputRow.style.display = 'none';
    processingEl = document.createElement('div');
    processingEl.className = 'line processing';
    log.appendChild(processingEl);
    log.scrollTop = log.scrollHeight;

    let frame = 0;
    processingTimer = setInterval(() => {
      const phrase = PHRASES[Math.floor(frame / 4) % PHRASES.length];
      const blocks = 10;
      const filled = frame % (blocks + 1);
      const bar = '['.concat('#'.repeat(filled), '-'.repeat(blocks - filled), ']');
      processingEl.innerHTML = '<span class="tag">[SYS]</span><span class="bar">' + bar + '</span> ' + phrase + '...';
      log.scrollTop = log.scrollHeight;
      frame++;
    }, 180);
  }

  function stopProcessing() {
    if (processingTimer) clearInterval(processingTimer);
    if (processingEl && processingEl.parentNode) processingEl.parentNode.removeChild(processingEl);
    processingEl = null;
    inputRow.style.display = 'flex';
    cmdInput.disabled = false;
    cmdInput.focus();
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-err');
    errEl.textContent = '';
    if (!username || !password) { errEl.textContent = 'User ID and access key required.'; return; }

    try {
      const res = await fetch('/api/client/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Authentication failed.'; return; }

      loginScreen.style.display = 'none';
      terminalScreen.style.display = 'flex';
      sessionIdEl.textContent = 'SESSION ' + Math.random().toString(16).slice(2, 8).toUpperCase();
      addLine('[SYS]', 'LINK ESTABLISHED. AUTHENTICATION ACCEPTED.', 'system');
      connectSocket(data.token);
    } catch (e) {
      errEl.textContent = 'Connection error. Try again.';
    }
  }

  function connectSocket(token) {
    socket = io();
    socket.on('connect', () => socket.emit('auth', { token, role: 'client' }));
    socket.on('message:reply', (entry) => {
      stopProcessing();
      addLine('[SERVER]', entry.text, 'server');
    });
  }

  cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const text = cmdInput.value.trim();
      if (!text) return;
      addLine('[YOU]', text, 'client');
      socket.emit('message:send', { text });
      cmdInput.value = '';
      cmdInput.disabled = true;
      startProcessing();
    }
  });
</script>
</body>
</html>
